<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>memories.</title>
  <script src="../extend.js"></script>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeModal()"></div>

<!-- ══ 날짜 피커 모달 ══ -->
<div class="modal" id="datePickerModal" style="z-index:102; opacity: 0;">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <div class="modal-title" id="datePickerTitle">날짜 선택</div>
    <button class="modal-close" onclick="closeDatePicker()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="date-picker-wrap">
    <div class="drum-wrap">
      <div class="drum-col" id="drum-year"></div>
      <div class="drum-col" id="drum-month"></div>
      <div class="drum-col" id="drum-day"></div>
      <div class="drum-highlight"></div>
    </div>
  </div>
  <button class="btn-submit" onclick="confirmDate()" style="margin-bottom:8px">
    <span class="btn-text">확인</span>
  </button>
</div>

<!-- ══ 여행 추가 모달 ══ -->
<div class="modal" id="addModal" style="opacity: 0;">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <div class="modal-title">여행 추가</div>
    <button class="modal-close" onclick="closeModal('addModal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="form">
    <div class="field">
      <div class="field-label">여행 제목 *</div>
      <input id="f-title" type="text" placeholder="예: 제주 여름 여행" maxlength="50">
    </div>
    <div class="field">
      <div class="field-label">여행지</div>
      <input id="f-location" type="text" placeholder="예: 제주도" maxlength="50">
    </div>
    <div class="date-row">
      <div class="field">
        <div class="field-label">출발일</div>
        <div class="date-picker-btn" id="btn-start" onclick="openDatePicker('start')">
          <span id="label-start" class="date-picker-placeholder">날짜 선택</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
      </div>
      <div class="field">
        <div class="field-label">귀가일</div>
        <div class="date-picker-btn" id="btn-end" onclick="openDatePicker('end')">
          <span id="label-end" class="date-picker-placeholder">날짜 선택</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
      </div>
    </div>
    <div class="field">
      <div class="field-label">메모</div>
      <textarea id="f-memo" placeholder="이번 여행에 대해 메모를 남겨보세요."></textarea>
    </div>
  </div>
  <button class="btn-submit" id="btnSubmit" onclick="submitTrip()">
    <div class="spinner"></div>
    <span class="btn-text">추가하기</span>
  </button>
</div>

<!-- ══ 앱 레이아웃 ══ -->
<div class="app">
 <div class="nav-bar" id="navBar">
  <div class="nav-logo">memories.</div>

  <div class="nav-actions">
  <button class="nav-icon-btn" id="pushAlarmBtn" type="button" aria-label="푸시 알림">
    <svg viewBox="0 0 24 24" width="23" height="23" fill="none"stroke="#5c3d1e" stroke-width="1.7" xmlns="http://www.w3.org/2000/svg" style="transform: scaleX(1.06) scaleY(0.96);">
      <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
    </svg>
    <span class="alarm-dot" id="alarmDot"></span>
  </button>

  <button class="nav-icon-btn" id="navProfileBtn" type="button" aria-label="내 프로필">
	  <svg viewBox="0 0 24 24" fill="none" stroke="#5c3d1e" stroke-width="1.7" width="25" height="25">
		<circle cx="12" cy="8" r="4"/>
		<path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
	   </svg>
  </button>
</div>
</div>


  <div class="scroll-wrap" id="scrollWrap">
    <div class="big-header" id="bigHeader">
	  <div class="bh-top">
	    <div class="bh-profiles" id="profiles-row">
	      <div class="profile-item">
	        <div class="profile-avatar">
	          <svg viewBox="0 0 24 24" fill="none" stroke="#c8b09a" stroke-width="1.5" width="18" height="18">
	            <circle cx="12" cy="8" r="4"/>
	            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
	          </svg>
	        </div>
	      </div>
	    </div>
	  </div>
	  <div class="bh-body">
	    <div class="bh-title">함께한<br><span>모든 순간</span></div>
		<div class="bh-label" id="greeting-eyebrow">
		      <span class="eyebrow-line"></span>
		      <span>-</span>
		    </div>
	  </div>
	</div>

    <div class="header-divider"></div>

    <div class="section" id="heroSection"></div>

    <div class="section">
      <div class="section-label">모든 여행</div>
      <div class="trips-grid" id="tripsGrid">
        <div class="skeleton-card">
          <div class="skeleton skeleton-thumb"></div>
          <div class="skeleton-info">
            <div class="skeleton skeleton-line-1"></div>
            <div class="skeleton skeleton-line-2"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton skeleton-thumb"></div>
          <div class="skeleton-info">
            <div class="skeleton skeleton-line-1"></div>
            <div class="skeleton skeleton-line-2"></div>
          </div>
        </div>
      </div>
    </div>

	<div class="section">
		<div class="section-label">즐겨찾기</div>
		<div class="trips-grid" id="tripsGrid">
			<div class="trip-card">
				<div class="trip-thumb">
					<div class="trip-thumb-ph">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <polyline points="21 15 16 10 5 21" />
        </svg>
					</div>
				</div>
				<div class="trip-info">
					<div class="trip-name" style="text-align: center">즐겨찾기</div>
				</div>
			</div>
		</div>

	</div>

			<div class="page-end"></div>
  </div>
</div>

</body>

</html>
