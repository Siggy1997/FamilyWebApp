<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>memories. — 로그인</title>
<script src="../extend.js?v=20260323_1"></script>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-grain"></div>
<div class="page">
	<div class="logo-wrap">
		<div class="logo-text">memories.</div>
		<div class="logo-sub">소중한 순간들</div>
	</div>

	<div class="card">
		<div class="card-heading">반가워요</div>
		<div class="card-desc">계정에 로그인하고 여행 기록을 이어가세요.</div>

		<div class="field" id="field-id">
			<div class="field-label">아이디</div>
			<div class="input-wrap">
				<span class="input-icon">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
						<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
						<circle cx="12" cy="7" r="4" />
					</svg>
				</span>
				<input type="text" id="input-id" placeholder="아이디 입력" autocomplete="username">
			</div>
		</div>

		<div class="field" id="field-pw">
			<div class="field-label">비밀번호</div>
			<div class="input-wrap">
				<span class="input-icon">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
						<rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
						<path d="M7 11V7a5 5 0 0 1 10 0v4" />
					</svg>
				</span>
				<input type="password" id="input-pw" placeholder="비밀번호 입력" autocomplete="current-password">
				<button class="pw-toggle" onclick="togglePw()" type="button" aria-label="비밀번호 표시">
					<svg id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
						<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
						<circle cx="12" cy="12" r="3" />
					</svg>
					<svg id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
						style="display:none">
						<path
							d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
						<line x1="1" y1="1" x2="23" y2="23" />
					</svg>
				</button>
			</div>
		</div>

		<div
			style="display:flex; align-items:center;gap: 14px; margin-bottom:20px; margin-top:4px;">
			<label class="remember-row">
				<input type="checkbox" id="auto-login">
				<div class="custom-check">
					<svg class="check-mark" viewBox="0 0 10 10" fill="none">
						<polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#fff" stroke-width="1.6"
							stroke-linecap="round" stroke-linejoin="round" />
					</svg>
				</div>
				<span class="remember-label">자동 로그인</span>
			</label>
			<label class="remember-row">
				<input type="checkbox" id="chk-remember">
				<div class="custom-check">
					<svg class="check-mark" viewBox="0 0 10 10" fill="none">
						<polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#fff" stroke-width="1.6"
							stroke-linecap="round" stroke-linejoin="round" />
					</svg>
				</div>
				<span class="remember-label">아이디 저장</span>
			</label>
			
			<!--<a href="#" class="forgot-link">비밀번호 찾기</a>-->
		</div>

		<button class="btn-submit" id="btnLogin" onclick="handleLogin()">
			<div class="spinner"></div>
			<span class="btn-text">로그인</span>
		</button>

		<div class="divider">
			<div class="divider-line"></div>
			<span class="divider-text">또는</span>
			<div class="divider-line"></div>
		</div>

		<div class="signup-row">
			아직 계정이 없으신가요? <a href="#">회원가입</a>
		</div>
	</div>

	<div class="bottom-deco">
		<span class="deco-line">
			<span></span>
			모든 순간을 기록하세요
			<span></span>
		</span>
	</div>
</div>
</body>
</html>
