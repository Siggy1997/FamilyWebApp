<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>memories.</title>
<meta name="theme-color" content="#ffffff">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
</head>
<body>

<!-- 숨겨진 파일 인풋 -->
<input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">

<!-- ── 업로드 진행 시트 ── -->
<div class="upload-sheet" id="uploadSheet">
  <div class="upload-sheet-inner">
    <div class="upload-sheet-header">
      <div class="upload-sheet-title">업로드 중</div>
      <div class="upload-sheet-count" id="uploadCount">0 / 0</div>
    </div>
    <div class="upload-progress-bar">
      <div class="upload-progress-fill" id="uploadFill"></div>
    </div>
    <div class="upload-file-list" id="uploadFileList"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════
     Photo Viewer Modal
══════════════════════════════════════════════════ -->
<div class="photo-viewer" id="photoViewer" aria-hidden="true">
  <div class="pv-header">
    <button class="pv-close" id="pvClose" aria-label="닫기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
 
  <div class="swiper pv-swiper" id="pvSwiper">
    <div class="swiper-wrapper" id="pvSwiperWrapper"></div>
    <div class="swiper-button-prev pv-arrow pv-arrow--prev"></div>
    <div class="swiper-button-next pv-arrow pv-arrow--next"></div>
  </div>
 
  <div class="pv-thumb-bar">
    <div class="pv-thumb-strip" id="pvThumbStrip"></div>
	<div style="display: flex;justify-content: space-between;margin: 9px 7px;">
  	<button class="pv-share" id="pvDelete" aria-label="삭제">
	    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
	      <path d="M3 6h18"/>
	      <path d="M8 6V4.8C8 3.806 8.806 3 9.8 3h4.4C15.194 3 16 3.806 16 4.8V6"/>
	      <path d="M19 6l-1 13.2A2 2 0 0116.008 21H7.992A2 2 0 016 19.2L5 6"/>
	      <path d="M10 10v7"/>
	      <path d="M14 10v7"/>
	    </svg>
	  </button>
	  <button class="pv-share" id="pvLike" aria-label="좋아요">
	    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
	      <path d="M12 21s-6.716-4.438-9.192-8.03C.884 10.18 1.2 6.6 4.24 4.76c2.27-1.38 4.85-.61 6.26 1.11 1.41-1.72 3.99-2.49 6.26-1.11 3.04 1.84 3.356 5.42 1.432 8.21C18.716 16.562 12 21 12 21z"/>
	    </svg>
	  </button>
	  <button class="pv-share" id="pvShare" aria-label="저장">
	    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
	      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
	      <polyline points="7 10 12 15 17 10"/>
	      <line x1="12" y1="15" x2="12" y2="3"/>
	    </svg>
	  </button>
	</div>
  </div>
</div>

<div class="app" id="app">

  <!-- ── 상단 Nav ── -->
  <div class="detail-nav">
    <div class="detail-nav-inner">
      <button class="btn-back" id="btnBack" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        뒤로
      </button>
      <div class="nav-title" id="navTitle"></div>
      <div class="nav-actions" id="navActions">
        <!-- 선택 모드: 취소만 표시 -->
        <button class="nav-text-btn" id="btnSelectCancel" onclick="cancelSelect()" style="display:none">취소</button>
      </div>
    </div>
  </div>

  <!-- ── 스크롤 영역 ── -->
  <div class="scroll-wrap" id="scrollWrap">

    <!-- 히어로 배너 -->
    <div class="trip-hero" id="tripHero"></div>

    <!-- 기본 정보 -->
    <div class="trip-info-block" id="tripInfoBlock"></div>

    <!-- ── 탭 바 ── -->
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" onclick="switchTab('highlight', this)">하이라이트</button>
      <button class="tab-btn" onclick="switchTab('gallery', this)">사진</button>
      <button class="tab-btn" onclick="switchTab('videos', this)">동영상</button>
      <button class="tab-btn" onclick="switchTab('schedule', this)">일정</button>
      <div class="tab-indicator" id="tabIndicator"></div>
    </div>

    <!-- ── 탭 콘텐츠 ── -->
    <div class="tab-content">
      <div class="tab-panel active" id="sectionHighlight"></div>
      <div class="tab-panel" id="sectionGallery"></div>
      <div class="tab-panel" id="sectionVideos"></div>
      <div class="tab-panel" id="sectionSchedule"></div>
    </div>

    <div class="page-end"></div>
  </div>

  <!-- ── 선택 모드 하단 액션 바 ── -->
  <div class="select-action-bar" id="selectActionBar">
    <button class="select-action-btn select-action-btn--delete" onclick="deleteSelected()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
      </svg>
    </button>
    <div class="select-action-count" id="selectActionCount">0개 선택</div>
    <button class="select-action-btn select-action-btn--download" onclick="downloadSelected()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="../extend.js"></script>
</body>
</html>
