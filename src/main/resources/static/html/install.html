<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>status bar image test</title>

  <style>
    :root {
      --safe-top: 0px;
      --app-height: 100vh;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(var(--app-height) + var(--safe-top));
      object-fit: contain;
      object-position: center top;
      background: black;
    }
  </style>
</head>
<body>
  <img src="/storage/2/df32cd9c526846de992ceb7270961953.png" />

  <script>
    function setViewportVars() {
      const doc = document.documentElement;

      // 현재 보이는 앱 높이
      const innerH = window.innerHeight;
      doc.style.setProperty('--app-height', `${innerH}px`);

      // env(safe-area-inset-top) 읽기용
      const probe = document.createElement('div');
      probe.style.position = 'fixed';
      probe.style.top = '0';
      probe.style.left = '0';
      probe.style.height = 'env(safe-area-inset-top)';
      probe.style.visibility = 'hidden';
      document.body.appendChild(probe);

      const cssSafeTop = parseFloat(getComputedStyle(probe).height) || 0;
      probe.remove();

      // visualViewport 보정
      const vvH = window.visualViewport ? window.visualViewport.height : 0;
      const extraTop = window.visualViewport
        ? Math.max(0, window.innerHeight - window.visualViewport.height)
        : 0;

      // 최종 safe-top
      const safeTop = Math.max(cssSafeTop, extraTop);
      doc.style.setProperty('--safe-top', `${safeTop}px`);

      alert(
        `[Viewport Debug]\n\n` +
        `window.innerHeight: ${innerH}px\n` +
        `visualViewport.height: ${vvH}px\n` +
        `env(safe-area-inset-top): ${cssSafeTop}px\n` +
        `innerHeight - visualViewport.height: ${extraTop}px\n` +
        `최종 safeTop: ${safeTop}px\n\n` +
        `적용 height: calc(${innerH}px + ${safeTop}px)`
      );
    }

    window.addEventListener('load', setViewportVars);
  </script>
</body>
</html>
