<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0704">
<title>사진 보기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/css/common.css">
<link rel="stylesheet" href="/css/trip.css">
<style>
body {
  background: #0a0704;
  animation: none;
  overflow: hidden;
}
body::after { display: none; }

.viewer-header {
  position: fixed;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: var(--max-w);
  padding: calc(var(--safe-top) + 14px) 18px 14px;
  display: flex; align-items: center;
  justify-content: space-between;
  z-index: 100;
  background: linear-gradient(to bottom, rgba(10,7,4,0.7) 0%, transparent 100%);
  transition: opacity 0.3s;
}
.viewer-header.hidden { opacity: 0; pointer-events: none; }

.counter {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 14px; color: rgba(255,255,255,0.65);
}

.swiper {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
}
.swiper-slide {
  display: flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
}

/* width 100%, 세로 중앙, 비율 유지 */
.photo-img {
  width: 100%;
  height: auto;
  max-height: 100dvh;
  object-fit: contain;
  display: block;
  opacity: 0;
  transition: opacity 0.18s ease;
}
.photo-img.loaded { opacity: 1; }

.photo-ph {
  width: 100%;
  aspect-ratio: 3/4;
  max-height: 65dvh;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 80px;
}
.p-bg-1 { background: linear-gradient(160deg,#b8dce8,#4a9ac0,#1a6090); }
.p-bg-2 { background: linear-gradient(160deg,#c8e4b0,#7ab870,#3a6830); }
.p-bg-3 { background: linear-gradient(160deg,#e8c898,#c09860,#806030); }
.p-bg-4 { background: linear-gradient(160deg,#d8b8e8,#a878c8,#684890); }
.p-bg-5 { background: linear-gradient(160deg,#e8d898,#c0a858,#806020); }
.p-bg-6 { background: linear-gradient(160deg,#b8e8d8,#68b8a0,#386850); }
.p-bg-7 { background: linear-gradient(160deg,#e8b8c8,#c07888,#804858); }

.viewer-bottom {
  position: fixed;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: var(--max-w);
  z-index: 100;
  background: linear-gradient(to top, rgba(10,7,4,0.9) 0%, transparent 100%);
  transition: opacity 0.3s;
}
.viewer-bottom.hidden { opacity: 0; pointer-events: none; }

.strip {
  display: flex; gap: 5px;
  padding: 31px 18px calc(var(--safe-bot) + 24px);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.strip::-webkit-scrollbar { display: none; }
.strip-item {
	flex-shrink: 0;
	width: 40px;
	height: 40px;
	border-radius: 8px;
	overflow: hidden;
	opacity: 0.45;
	border: 2px solid transparent;
	transition: all 0.2s;
	cursor: pointer;
	background: rgba(255, 255, 255, 0.08);
}
.strip-item.active { opacity: 1; border-color: var(--accent);}
.strip-item img { width: 100%; height: 100%; object-fit: cover; }
.strip-item-ph {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

.action-row {
  display: flex; justify-content: flex-end;
  gap: 8px; padding: 0 18px 10px;
}
.action-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.7); cursor: pointer;
  transition: all 0.15s;
}
.action-btn:active { background: rgba(255,255,255,0.22); }
.action-btn svg { width: 16px; height: 16px; }
</style>
</head>
<body>
<div id="toast"></div>

<header class="viewer-header" id="vheader">
  <button class="icon-btn dark" onclick="Router.pop()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <div class="counter" id="counter"></div>
  <button class="icon-btn dark" onclick="sharePhoto()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" y1="2" x2="12" y2="15"/>
    </svg>
  </button>
</header>

<div class="swiper" id="mainSwiper">
  <div class="swiper-wrapper" id="swiperWrapper"></div>
</div>

<div class="viewer-bottom" id="vbottom">
  <div class="action-row">
    <button class="action-btn" onclick="sharePhoto()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </button>
  </div>
  <div class="strip" id="strip"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="js/common.js"></script>
<script>
const photos  = JSON.parse(sessionStorage.getItem('viewer_photos') || '[]');
const trip    = JSON.parse(sessionStorage.getItem('viewer_trip')   || '{}');
const total   = photos.length;
const initIdx = Math.max(0, Math.min(
  parseInt(new URLSearchParams(location.search).get('idx') || '0'),
  total - 1
));

// 슬라이드 생성 — 초기 슬라이드만 src 직접 설정 (깜박임 방지)
document.getElementById('swiperWrapper').innerHTML = photos.map((p, i) => `
  <div class="swiper-slide">
    ${p.file_path
      ? `<img class="photo-img${i === initIdx ? ' loading-now' : ''}"
             ${i === initIdx ? `src="${p.file_path}"` : `data-src="${p.file_path}"`}
             alt="">`
      : `<div class="photo-ph p-bg-${(i % 7) + 1}">📷</div>`}
  </div>`).join('');

// 초기 슬라이드 이미지 즉시 loaded 처리
const initImg = document.querySelector('.photo-img.loading-now');
if (initImg) {
  if (initImg.complete) initImg.classList.add('loaded');
  else initImg.onload = () => initImg.classList.add('loaded');
  initImg.classList.remove('loading-now');
}

// 스트립 생성
document.getElementById('strip').innerHTML = photos.map((p, i) => `
  <div class="strip-item" id="strip-${i}" onclick="swiper.slideTo(${i})">
    ${p.file_path
      ? `<img src="${p.file_path}">`
      : `<div class="strip-item-ph p-bg-${(i % 7) + 1}"></div>`}
  </div>`).join('');

function updateUI(idx) {
  document.getElementById('counter').textContent = total ? `${idx + 1} / ${total}` : '';
  document.querySelectorAll('.strip-item').forEach((el, i) =>
    el.classList.toggle('active', i === idx));
  document.getElementById(`strip-${idx}`)
    ?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function loadSlideImage(sw, idx) {
  const slide = sw.slides[idx];
  if (!slide) return;
  const img = slide.querySelector('img[data-src]');
  if (!img) return;
  img.src = img.dataset.src;
  img.removeAttribute('data-src');
  img.onload  = () => img.classList.add('loaded');
  img.onerror = () => img.classList.add('loaded');
}

const swiper = new Swiper('#mainSwiper', {
  initialSlide: initIdx,
  speed: 300,
  grabCursor: true,
  on: {
    init(sw) {
      // 초기 슬라이드는 이미 로드됨 — 앞뒤만 prefetch
      loadSlideImage(sw, sw.activeIndex - 1);
      loadSlideImage(sw, sw.activeIndex + 1);
      updateUI(sw.activeIndex);
    },
    slideChange(sw) {
      loadSlideImage(sw, sw.activeIndex);
      loadSlideImage(sw, sw.activeIndex + 1);
      loadSlideImage(sw, sw.activeIndex - 1);
      updateUI(sw.activeIndex);
    },
  },
});

// 탭으로 UI 토글
let uiVisible = true;
document.getElementById('mainSwiper').addEventListener('click', e => {
  if (e.target.closest('.strip') || e.target.closest('.action-btn')) return;
  uiVisible = !uiVisible;
  document.getElementById('vheader').classList.toggle('hidden', !uiVisible);
  document.getElementById('vbottom').classList.toggle('hidden', !uiVisible);
});

async function sharePhoto() {
  const p = photos[swiper.activeIndex];
  if (!p?.file_path) return;
  if (!navigator.share) { showToast('이 기기에서는 공유가 지원되지 않아요.'); return; }
  try {
    const res  = await fetch(p.file_path);
    const blob = await res.blob();
    const file = new File([blob], p.file_path.split('/').pop() || 'photo.jpg', { type: blob.type });
    if (navigator.canShare?.({ files: [file] })) {
      await navigator.share({ files: [file] });
    } else {
      await navigator.share({ url: p.file_path });
    }
  } catch (e) {
    if (e.name !== 'AbortError') showToast('공유에 실패했어요.');
  }
}
</script>
</body>
</html>
